<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام تحليل العيوب</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
    body { background-color: #f4f6f9; margin: 0; padding: 0; }
    
    /* 1. شاشة الترحيب */
    #splash-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: #1e40af;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      width: 40px; height: 40px;
      animation: spin 1s linear infinite;
      margin-top: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* 2. الصفحة الرئيسية والقائمة */
    .app-header { background: #1d4ed8; color: white; padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; }
    .container { padding: 15px; max-width: 500px; margin: auto; }
    
    .menu-card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: pointer;
    }
    .menu-icon { font-size: 24px; margin-left: 15px; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }
    .menu-title { font-weight: bold; font-size: 1rem; color: #1e293b; }
    .menu-sub { font-size: 0.8rem; color: #64748b; margin-top: 3px; }

    /* 3. شاشة النموذج (إضافة عيب) */
    #form-screen { display: none; }
    .btn-back { background: #e2e8f0; border: none; padding: 8px 15px; border-radius: 6px; margin-bottom: 15px; cursor: pointer; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; color: #334155; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; }
    .btn-submit { width: 100%; background: #2563eb; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

  <!-- 1. شاشة الترحيب (Welcome) -->
  <div id="splash-screen">
    <div style="font-size: 50px;">📊</div>
    <h2>نظام تحليل العيوب</h2>
    <p>DEFECT Analysis System</p>
    <div class="loader"></div>
  </div>

  <!-- 2. الشاشة الرئيسية (القائمة) -->
  <div id="home-screen">
    <div class="app-header">Can Defect Analysis</div>
    <div class="container">
      
      <div class="menu-card" onclick="showForm()">
        <div class="menu-icon" style="background: #2563eb;">📷</div>
        <div>
          <div class="menu-title">تصوير عيب جديد</div>
          <div class="menu-sub">إضافة عيب جديد إلى قاعدة البيانات</div>
        </div>
      </div>

      <div class="menu-card">
        <div class="menu-icon" style="background: #16a34a;">🔍</div>
        <div>
          <div class="menu-title">اكتشاف عيب</div>
          <div class="menu-sub">تصوير العيب وتحليله بالذكاء الاصطناعي</div>
        </div>
      </div>

      <div class="menu-card">
        <div class="menu-icon" style="background: #ea580c;">📚</div>
        <div>
          <div class="menu-title">قاعدة المعرفة</div>
          <div class="menu-sub">عرض جميع العيوب والحلول</div>
        </div>
      </div>

      <div class="menu-card">
        <div class="menu-icon" style="background: #9333ea;">📊</div>
        <div>
          <div class="menu-title">الإحصائيات</div>
          <div class="menu-sub">إحصائيات خطوط الإنتاج والعيوب</div>
        </div>
      </div>

    </div>
  </div>

  <!-- 3. شاشة نموذج إدخال العيب -->
  <div id="form-screen">
    <div class="app-header">إضافة تحليل العيب</div>
    <div class="container">
      <button class="btn-back" onclick="showHome()">⬅ رجوع للقائمة</button>
      
      <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
        <div class="form-group">
          <label>عنوان العيب / المشكلة:</label>
          <input type="text" placeholder="مثال: Rim Dent / Flange Distortion">
        </div>

        <div class="form-group">
          <label>تصنيف العيب:</label>
          <select>
            <option>تشوه حافة (Rim Dent / Flange)</option>
            <option>خدش في الدهان (Scratch)</option>
            <option>تسريب (Leakage)</option>
          </select>
        </div>

        <div class="form-group">
          <label>صورة العيب:</label>
          <input type="file" accept="image/*">
        </div>

        <div class="form-group">
          <label>التفاصيل والوصف:</label>
          <textarea rows="3" placeholder="اكتب تفاصيل إضافية..."></textarea>
        </div>

        <button class="btn-submit" onclick="alert('تم حفظ البيانات بنجاح!')">إضافة وتحليل العيب</button>
      </div>
    </div>
  </div>

  <script>
    // إخفاء شاشة الترحيب بعد ثانيتين
    setTimeout(() => {
      const splash = document.getElementById('splash-screen');
      splash.style.opacity = '0';
      setTimeout(() => splash.style.display = 'none', 500);
    }, 2000);

    // التنقل بين الشاشات
    function showForm() {
      document.getElementById('home-screen').style.display = 'none';
      document.getElementById('form-screen').style.display = 'block';
    }

    function showHome() {
      document.getElementById('form-screen').style.display = 'none';
      document.getElementById('home-screen').style.display = 'block';
    }
  </script>
</body>
</html>
