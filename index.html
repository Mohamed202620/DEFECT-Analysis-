<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEFECT Analysis System - نظام تحليل العيوب</title>
    <style>
        :root {
            --primary-color: #1e293b;
            --accent-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 15px;
        }

        h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #64748b;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary-color);
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, textarea:focus, select:focus {
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .results {
            margin-top: 30px;
            display: none;
            background-color: #f1f5f9;
            border-radius: 8px;
            padding: 20px;
        }

        .results.active {
            display: block;
        }

        .results h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .result-item {
            margin-bottom: 10px;
            padding: 10px;
            background-color: white;
            border-radius: 6px;
            border-right: 4px solid var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>نظام تحليل العيوب (DEFECT Analysis)</h1>
            <p class="subtitle">لوحة تسجيل ومتابعة وتحليل عيوب البيانات والمشروع</p>
        </header>

        <main>
            <form id="defectForm">
                <div class="form-group">
                    <label for="defectTitle">عنوان العيب / المشكلة:</label>
                    <input type="text" id="defectTitle" placeholder="أدخل وصفاً قصيراً للعيوب..." required>
                </div>

                <div class="form-group">
                    <label for="defectCategory">تصنيف العيب:</label>
                    <select id="defectCategory">
                        <option value="برمجي">عيب برمجي (Software Bug)</option>
                        <option value="تصميم">مشكلة تصميم (UI/UX)</option>
                        <option value="بيانات">خطأ في البيانات (Data Error)</option>
                        <option value="أداء">أداء بطيء (Performance)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="defectDesc">التفاصيل والأسباب المتوقعة:</label>
                    <textarea id="defectDesc" rows="4" placeholder="اكتب تفاصيل إضافية حول العيب..." required></textarea>
                </div>

                <button type="submit">إضافة وتحليل العيب</button>
            </form>

            <section class="results" id="resultsSection">
                <h2>نتائج التحليل والتقارير:</h2>
                <div id="resultsList"></div>
            </section>
        </main>
    </div>

    <script>
        const form = document.getElementById('defectForm');
        const resultsSection = document.getElementById('resultsSection');
        const resultsList = document.getElementById('resultsList');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const title = document.getElementById('defectTitle').value;
            const category = document.getElementById('defectCategory').value;
            const desc = document.getElementById('defectDesc').value;

            const resultCard = document.createElement('div');
            resultCard.className = 'result-item';
            resultCard.innerHTML = `
                <strong>[${category}] ${title}</strong>
                <p style="margin-top: 5px; color: #475569;">${desc}</p>
                <small style="color: #94a3b8;">تاريخ التسجيل: ${new Date().toLocaleTimeString('ar-EG')}</small>
            `;

            resultsList.prepend(resultCard);
            resultsSection.classList.add('active');

            form.reset();
        });
    </script>
</body>
</html>
